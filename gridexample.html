<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
.container{
    display: grid;
    grid-template-columns: 150px 150px 150px 150px 150px 150px 150px;
    grid-template-rows: 100px 100px 100px 100px 100px 100px 100px;
    background-color: rgb(183, 183, 210);
    row-gap : 15px;
    column-gap: 15px;

    
}
.item{
    display: flex;
    flex-direction: column;
    background-color: rgb(125, 125, 192);
    grid-row: 1 /3;
    grid-column: 1/3;
    border-radius: 20px;
   
}
.item2{
    display: flex;
    flex-direction: column;
    background-color: rgb(125, 125, 192);
    grid-row: 3/5;
    grid-column: 1/3;
     border-radius: 20px;
     text-align: center;
        color: white;
}
.item3{
    display: flex;
    flex-direction: column;
    background-color: rgb(125, 125, 192);
    grid-row: 5/7;
    grid-column: 1/5;
    border-radius: 20px;
        text-align: center;
        color: white;
}
.item4{
    display: flex;
    background-color: rgb(125, 125, 192);
    grid-row: 1/3;
    grid-column: 3/5;
    border-radius: 20px;
        text-align: center;
        color: white;
        justify-content: center;
        flex-direction: column;
}
.item5{
    display: flex;
    flex-direction: column;
    background-color: rgb(125, 125, 192);
    grid-row: 3/5;
    grid-column: 3/5;
    border-radius: 20px;   
    text-align: center;
    color: white; 
}
.item6{
    display: flex;
    flex-direction: column;
    background-color: rgb(125, 125, 192);
    grid-row: 1/3;
    grid-column: 5/7;
    border-radius: 20px;
    text-align: center;
    color: white;
    justify-content: center;
  
    
}
.item7{
    display: flex;
    flex-direction: column;
    background-color: rgb(125, 125, 192);
    grid-row: 3/7;
    grid-column: 5/7;
    border-radius: 20px;
    text-align: center;
    color: white;
}



</style>
<body>
    <div class="container">
    <div class="item"> 
        <h1></h1>
    </div>
       <div class="item2">
        <h1> 1,538 </h1>
       </div>
       <div class="item3">
        <h1> A place to learn UI Design & Web Design </h1>
       </div>
       <div class="item4"> <h1>25K</h1> </div>
         <div class="item5"> <h1>DESIGN</h1> </div>
         <div class="item6"> <h1>50K</h1> </div>
         <div class="item7"> <h1>200K</h1> </div>
</div>
</body>
</html>
