<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
  .container{
        display: grid;
        grid-template-columns: 150px 150px 150px 150px 150px   ;
        grid-template-rows: 100px 100px 100px 100px 100px  ;
        background-color: rgb(232, 232, 233);
        justify-content: center;
        align-content: center;
        gap: 10px;
    }
    .rect1{
        display: grid;
    background-color: black;
    grid-row: 1/2;
    grid-column: 2/5;
    border-radius: 5px;
    }
    .rect2{
        display: grid;
        background-color: lightblue;
        grid-row: 1/5;
        grid-column: 1/2;
        border-radius: 5px;
    }
    .rect3{
        display: grid;
        background-color: aqua;
        grid-row: 2/3;
        grid-column:2/3 ;
        border-radius: 5px;
    }
    .rect4{
        display: grid;
        background-color: bisque;
        grid-row: 2/3;
        grid-column: 3/4;
        border-radius: 5px;
    }
     .rect5{
        display: grid;
        background-color: lightgreen;
        grid-row: 2/3;
        grid-column: 4/5;
        border-radius: 5px;
    }
     .rect6{
        display: grid;
        background-color: lightcoral;
        grid-row: 3/4;
        grid-column: 2/4;
        border-radius: 5px;
    }
    .rect7{
        display: grid;
        background-color: blueviolet;
        grid-row: 3/4;
        grid-column: 4/5;
        border-radius: 5px;
    }
    .rect8{
        display: grid;
        background-color: brown;
        grid-row: 4/5;
        grid-column: 2/3;
        border-radius: 5px;
    }
     .rect9{
        display: grid;
        background-color: plum;
        grid-row: 4/5;
        grid-column: 3/4;
        border-radius: 5px;
    }
     .rect10{
        display: grid;
        background-color: gray;
        grid-row: 4/5;
        grid-column: 4/5;
        border-radius: 5px;
    }
</style>
<body>
    <div class="container">
    <div class="rect1"></div>
    <div class="rect2"></div>
    <div class="rect3"></div>
    <div class="rect4"></div>
    <div class="rect5"></div>
    <div class="rect6"></div>
    <div class="rect7"></div>
    <div class="rect8"></div>
    <div class="rect9"></div>
    <div class="rect10"></div>
    </div>
</body>
</html>
