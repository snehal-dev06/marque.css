<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
.container {
        display: grid;
        grid-template-columns: 60px 60px 60px 60px;   ;
        grid-template-rows: 60px 60px 60px 60px 60px 60px     ;
        background-color: rgb(232, 232, 233);
        row-gap: 15px;
        column-gap: 15px;
        justify-content: center;
    }
.item1 {
        display: flex;
        background-color: lightblue;
        grid-row: 1/2;
        grid-column: 1/2;
        justify-content: center;
    }
.item2 {
        display: flex;
        background-color: lightcoral;
        grid-row: 1/2;
        grid-column: 2/3;
     
        text-align: center;
        color: white;
        justify-content: center;
        flex-direction: column;
    }
.item3 {
        display: flex;
        background-color: rgb(66, 51, 51);
        grid-row: 1/2;
        grid-column: 3/4;
      
        text-align: center;
        color: white;
        justify-content: center;
        flex-direction: column;
    }
.item4 {
        display: flex;
        background-color: lightgreen;
        grid-row: 3/4;
        grid-column: 3/4;
        justify-content: center;
        text-align: center;
        color: white;
        text-align: center;
        flex-direction: column;
       
    }
.item5 {
        display: flex;
        background-color: lightpink;
        grid-row: 3/4;
        grid-column: 2/3;
        justify-content: center;
        text-align: center;
        color: white;
        flex-direction: column;
        
    }
    .item6 {
        display: flex;
        background-color: rgb(239, 239, 162);
        grid-row: 3/4;
        grid-column: 1/2;
        justify-content: center;
        text-align: center;
        color: white;
        flex-direction: column;
    }
    .item7 {
        display: flex;
        background-color: rgb(69, 112, 175);
        grid-row: 2/3;
        grid-column: 1/2;
        justify-content: center;
        text-align: center;
        color: white;
        flex-direction: column;
    }
    .item8 {
        display: flex;
        background-color: rgb(170, 77, 108);
        grid-row: 4/5;
        grid-column: 3/4;
        justify-content: center;
        text-align: center;
        color: white;
        flex-direction: column;
    }
    .item9 {
        display: flex;
        background-color: black;
        grid-row: 5/6;
        grid-column: 2/3;
        justify-content: center;
        text-align: center;
        color: white;
        flex-direction: column;
    }
    .item10 {
        display: flex;
        background-color: rgb(245, 181, 103);
        grid-row: 5/6;
        grid-column: 1/2;
        justify-content: center;
        text-align: center;
        color: white;
        flex-direction: column;
    }
    .item11 {
        display: flex;
        background-color: plum;
        grid-row: 5/6;
        grid-column: 3/4;
        justify-content: center;
        text-align: center;
        color: white;
        flex-direction: column;
    }


</style>
      
<body>
    <div class="container">
        <div class="item1"></div>
        <div class="item2"></div>
        <div class="item3"></div>
        <div class="item4"></div>
        <div class="item5"></div>
        <div class="item6"></div>
        <div class="item7"></div>  
        <div class="item8"></div> 
        <div class="item9"></div>
        <div class="item10"></div>
        <div class="item11"></div>
    </div>
    
</body>
</html>
